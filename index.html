<!DOCTYPE html>

<head>

<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <span style="font-size:24px;">🚑</span>
      <div>
        <h1>EM Biweekly</h1>
        <span>急診醫學雙週報｜高影響力文獻精選</span>

    </nav>

<div class="hero">

      <div class="week-label">📅 本期文獻期間</div>

    <div class="stats">

      </div>
      <div class="stat">
        <div class="stat-num" id="rct-count">—</div>

      </div>

        <div class="stat-num" id="meta-count">—</div>
        <div class="stat-label">篇 Meta-Analysis</div>
      </div>
    </div>
  </div>
</div>

<div class="filter-bar">
  <span class="filter-label">篩選：</span>
  <button class="filter-btn active" onclick="filterArticles('all')">全部</button>
  <button class="filter-btn" onclick="filterArticles('RCT')">🔴 RCT</button>
  <button class="filter-btn" onclick="filterArticles('Meta-Analysis')">🟣 Meta-Analysis</button>
  <button class="filter-btn" onclick="filterArticles('Cohort Study')">🟢 Cohort Study</button>
  <button class="filter-btn" onclick="filterArticles('Secondary Analysis')">🟡 次分析</button>

<main>
  <div id="articles">
    <p style="color:#636e72; text-align:center; padding:40px;">載入中...</p>
  </div>
