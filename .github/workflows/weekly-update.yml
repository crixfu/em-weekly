name: Biweekly EM Literature Update

on:
  schedule:
    # 每隔兩週，每月 1 日及 15 日 20:00 UTC（台灣時間隔日 04:00）
    - cron: '0 20 1,15 * *'
  workflow_dispatch:  # 允許手動觸發

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Run literature update
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/update_articles.py

      - name: Commit and push if changed
        run: |
          git config user.name "EM Weekly Bot"
          git config user.email "action@github.com"
          git add data/latest.json data/archive/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            WEEK=$(date -u '+%Y/%m/%d')
            git commit -m "Biweekly update: ${WEEK}"
            git push
          fi
