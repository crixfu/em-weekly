<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>歷史存檔｜EM Biweekly 急診醫學雙週報</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚑</text></svg>">
</head>
<body>
<header>
  <div class="header-inner">
    <div class="logo">
      <span style="font-size:24px;">🚑</span>
      <div>
        <h1>EM Biweekly</h1>
        <span>急診醫學雙週報｜高影響力文獻精選</span>
      </div>
    </div>
    <nav class="nav">
      <a href="index.html">本期文獻</a>
      <a href="archive.html">歷史存檔</a>
      <a href="about.html">關於本站</a>
    </nav>
  </div>
</header>

<main style="max-width:1100px; margin:40px auto; padding:0 24px;">
  <h2 style="font-size:22px; color:#2c3e50; margin-bottom:8px;">📚 歷史文獻存檔</h2>
  <p style="color:#636e72; font-size:14px; margin-bottom:24px;">每兩週自動更新，點選期次查看完整文獻摘要</p>
  <div class="archive-grid" id="archive-list">
    <p style="color:#636e72;">載入中…</p>
  </div>
</main>

<div id="archive-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:1000; overflow-y:auto; padding:40px 16px;">
  <div style="max-width:900px; margin:0 auto; background:#fff; border-radius:12px; padding:32px;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
      <h2 id="modal-title" style="font-size:20px; color:#2c3e50; margin:0;"></h2>
      <button onclick="closeModal()" style="background:none; border:none; font-size:24px; cursor:pointer; color:#636e72;">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<footer>
  <p>EM Biweekly 由 Claude AI 每兩週自動整理文獻並更新</p>
</footer>

<script>
const CATEGORY_COLORS = {
  'RCT': '#e74c3c',
  'Meta-Analysis': '#8e44ad',
  'Cohort Study': '#2980b9',
  'Secondary Analysis': '#27ae60'
};

async function loadArchive() {
  const list = document.getElementById('archive-list');
  try {
    // Fetch current issue and archive index in parallel
    const [latestRes, indexRes] = await Promise.all([
      fetch('data/latest.json?t=' + Date.now()),
      fetch('data/archive/index.json?t=' + Date.now())
    ]);
    const latest = await latestRes.json();
    const items = await indexRes.json();

    items.sort((a, b) => b.generated.localeCompare(a.generated));

    // Load all archived issues for title preview
    const sections = await Promise.all(items.map(async (item) => {
      const r = await fetch('data/archive/' + item.file + '?t=' + Date.now());
      const data = await r.json();
      return { item, articles: data.articles };
    }));

    const currentCard = buildCard(latest.week, latest.articles, true, 'latest');
    const archivedCards = sections.map(({ item, articles }) =>
      buildCard(item.week, articles, false, item.file)
    ).join('');

    list.innerHTML = currentCard + archivedCards;
  } catch (e) {
    list.innerHTML = '<p style="color:#636e72;">載入失敗，請稍後再試</p>';
  }
}

function buildCard(week, articles, isCurrent, fileOrKey) {
  const borderStyle = isCurrent ? 'border:2px solid #27ae60;' : '';
  const badge = isCurrent
    ? '<div style="margin-top:6px; font-size:12px; color:#27ae60; font-weight:600;">● 本期</div>'
    : '';
  return `
    <div class="archive-card" onclick="openIssue('${fileOrKey}', '${week}')" style="cursor:pointer; ${borderStyle}">
      <div class="archive-week">${week}</div>
      <div class="archive-count">${articles.length}</div>
      <div class="archive-label">篇文獻</div>
      ${badge}
      <div style="margin-top:12px; border-top:1px solid #eee; padding-top:10px; text-align:left;">
        ${articles.map(a => {
          const color = CATEGORY_COLORS[a.category] || '#7f8c8d';
          return `<div style="display:flex; align-items:baseline; gap:6px; margin-bottom:5px;">
            <span style="flex-shrink:0; background:${color}; color:#fff; font-size:10px; padding:1px 6px; border-radius:8px;">${a.category.replace('Cohort Study','Cohort').replace('Secondary Analysis','2nd').replace('Meta-Analysis','Meta')}</span>
            <span style="font-size:12px; color:#2c3e50; line-height:1.4; overflow:hidden; display:-webkit-box; -webkit-line-clamp:1; -webkit-box-orient:vertical;">${a.title}</span>
          </div>`;
        }).join('')}
      </div>
    </div>
  `;
}

async function openIssue(fileOrKey, week) {
  const modal = document.getElementById('archive-modal');
  const body = document.getElementById('modal-body');
  document.getElementById('modal-title').textContent = `📅 ${week}`;
  body.innerHTML = '<p style="color:#636e72;">載入中…</p>';
  modal.style.display = 'block';
  document.body.style.overflow = 'hidden';

  try {
    const url = fileOrKey === 'latest'
      ? 'data/latest.json?t=' + Date.now()
      : 'data/archive/' + fileOrKey + '?t=' + Date.now();
    const res = await fetch(url);
    const data = await res.json();
    renderArticles(data.articles, body);
  } catch (e) {
    body.innerHTML = '<p style="color:#c0392b;">載入失敗</p>';
  }
}

function closeModal() {
  document.getElementById('archive-modal').style.display = 'none';
  document.body.style.overflow = '';
}

document.getElementById('archive-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

function renderEbmBlock(a) {
  if (!a.ebm_stats || !a.study_design || a.study_design === 'other') return '';
  const stats = a.ebm_stats;
  let fields = [];
  if (a.study_design === 'treatment') {
    fields = [
      { key: 'arr', label: 'ARR',  desc: '絕對風險差 (Absolute Risk Reduction)' },
      { key: 'rrr', label: 'RRR',  desc: '相對風險降低 (Relative Risk Reduction)' },
      { key: 'nnt', label: 'NNT',  desc: '需治療人數 (Number Needed to Treat)' },
      { key: 'hr',  label: 'HR',   desc: '危險比 (Hazard Ratio)' },
      { key: 'or',  label: 'OR',   desc: '勝算比 (Odds Ratio)' },
      { key: 'nnh', label: 'NNH',  desc: '傷害需治人數 (Number Needed to Harm)' },
    ];
  } else if (a.study_design === 'diagnostic') {
    fields = [
      { key: 'sensitivity', label: 'Sensitivity', desc: '敏感度' },
      { key: 'specificity', label: 'Specificity', desc: '特異度' },
      { key: 'lr_pos',      label: 'LR+',         desc: '陽性似然比 (Positive Likelihood Ratio)' },
      { key: 'lr_neg',      label: 'LR−',         desc: '陰性似然比 (Negative Likelihood Ratio)' },
      { key: 'ppv',         label: 'PPV',         desc: '陽性預測值 (Positive Predictive Value)' },
      { key: 'npv',         label: 'NPV',         desc: '陰性預測值 (Negative Predictive Value)' },
      { key: 'auc',         label: 'AUC',         desc: 'ROC 曲線下面積' },
    ];
  }
  const visible = fields.filter(f => stats[f.key] != null);
  if (visible.length === 0) return '';
  const rows = visible.map(f => `
    <tr>
      <td style="padding:7px 10px; font-weight:700; color:#2c3e50; white-space:nowrap; width:1%; border-bottom:1px solid #eef0f3;">${f.label}</td>
      <td style="padding:7px 10px; color:#2980b9; font-weight:600; white-space:nowrap; border-bottom:1px solid #eef0f3;">${stats[f.key]}</td>
      <td style="padding:7px 10px; color:#636e72; font-size:12px; border-bottom:1px solid #eef0f3;">${f.desc}</td>
    </tr>`).join('');
  const noteHTML = stats.note
    ? `<p style="margin:8px 0 0; font-size:12px; color:#7f8c8d; line-height:1.5;">📝 ${stats.note}</p>` : '';
  return `
    <div style="margin:12px 0;">
      <strong style="color:#2c3e50; font-size:13px;">📐 EBM 關鍵數值</strong>
      <div style="overflow-x:auto; margin-top:8px;">
        <table style="width:100%; border-collapse:collapse; font-size:13px; background:#fafbfc; border-radius:8px; overflow:hidden; border:1px solid #eef0f3;">
          <thead>
            <tr style="background:#eef0f3;">
              <th style="padding:7px 10px; text-align:left; color:#636e72; font-size:11px; font-weight:600; letter-spacing:0.5px;">指標</th>
              <th style="padding:7px 10px; text-align:left; color:#636e72; font-size:11px; font-weight:600; letter-spacing:0.5px;">數值</th>
              <th style="padding:7px 10px; text-align:left; color:#636e72; font-size:11px; font-weight:600; letter-spacing:0.5px;">說明</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
      ${noteHTML}
    </div>`;
}

function renderArticles(articles, container) {
  container.innerHTML = articles.map(a => {
    const color = CATEGORY_COLORS[a.category] || '#7f8c8d';
    return `
      <div style="border:1px solid #e0e0e0; border-radius:10px; padding:20px; margin-bottom:20px;">
        <div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px;">
          <span style="background:${color}; color:#fff; font-size:12px; padding:3px 10px; border-radius:12px;">${a.category}</span>
          <span style="background:#f0f0f0; color:#555; font-size:12px; padding:3px 10px; border-radius:12px;">${a.journal_abbr || a.journal}</span>
        </div>
        <h3 style="font-size:16px; color:#2c3e50; margin:0 0 6px;">${a.title}</h3>
        <p style="font-size:13px; color:#636e72; margin:0 0 14px;">${a.authors} · ${a.pubdate}</p>
        <div style="display:grid; gap:10px;">
          <div><strong style="color:#2c3e50;">背景</strong><p style="margin:4px 0 0; font-size:14px;">${a.background}</p></div>
          <div><strong style="color:#2c3e50;">方法</strong><p style="margin:4px 0 0; font-size:14px;">${a.methods}</p></div>
          <div><strong style="color:#2c3e50;">結果</strong><p style="margin:4px 0 0; font-size:14px;">${a.results}</p></div>
          ${renderEbmBlock(a)}
          <div><strong style="color:#2c3e50;">結論</strong><p style="margin:4px 0 0; font-size:14px;">${a.conclusion}</p></div>
        </div>
        ${a.pmid ? `<a href="https://pubmed.ncbi.nlm.nih.gov/${a.pmid}/" target="_blank" style="display:inline-block; margin-top:12px; font-size:12px; color:#2980b9;">PubMed →</a>` : ''}
      </div>
    `;
  }).join('');
}

loadArchive();
</script>
