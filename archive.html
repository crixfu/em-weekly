<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>歷史存檔｜EM Biweekly 急診醫學雙週報</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚑</text></svg>">
</head>
<body>
<header>
  <div class="header-inner">
    <div class="logo">
      <span style="font-size:24px;">🚑</span>
      <div>
        <h1>EM Biweekly</h1>
        <span>急診醫學雙週報｜高影響力文獻精選</span>
      </div>
    </div>
    <nav class="nav">
      <a href="index.html">本期文獻</a>
      <a href="archive.html">歷史存檔</a>
      <a href="about.html">關於本站</a>
    </nav>
  </div>
</header>

<main style="max-width:860px; margin:40px auto; padding:0 24px;">
  <h2 style="font-size:22px; color:#2c3e50; margin-bottom:8px;">📚 歷史文獻存檔</h2>
  <p style="color:#636e72; font-size:14px; margin-bottom:24px;">每兩週自動更新，點選標題查看完整摘要</p>
  <div id="archive-list">
    <p style="color:#636e72;">載入中…</p>
  </div>
</main>

<footer>
  <p>EM Biweekly 由 Claude AI 每兩週自動整理文獻並更新</p>
</footer>

<script>
const CATEGORY_COLORS = {
  'RCT': '#e74c3c',
  'Meta-Analysis': '#8e44ad',
  'Cohort Study': '#2980b9',
  'Secondary Analysis': '#27ae60'
};

async function loadArchive() {
  const list = document.getElementById('archive-list');
  try {
    const res = await fetch('data/archive/index.json?t=' + Date.now());
    const items = await res.json();

    if (!items.length) {
      list.innerHTML = '<p style="color:#636e72;">尚無歷史存檔</p>';
      return;
    }

    items.sort((a, b) => b.generated.localeCompare(a.generated));

    // Load all issues and render
    const sections = await Promise.all(items.map(async (item, i) => {
      const r = await fetch('data/archive/' + item.file + '?t=' + Date.now());
      const data = await r.json();
      return { item, articles: data.articles, i };
    }));

    list.innerHTML = sections.map(({ item, articles, i }) => `
      <div style="border:1px solid #dfe6e9; border-radius:12px; margin-bottom:20px; overflow:hidden;">
        <div style="background:#f8f9fa; padding:16px 20px; display:flex; justify-content:space-between; align-items:center;">
          <div>
            <span style="font-size:16px; font-weight:600; color:#2c3e50;">📅 ${item.week}</span>
            <span style="margin-left:12px; font-size:13px; color:#636e72;">${item.count} 篇</span>
            ${i === 0 ? '<span style="margin-left:8px; font-size:12px; color:#c0392b; font-weight:500;">最新</span>' : ''}
          </div>
        </div>
        <div style="padding:8px 0;">
          ${articles.map((a, idx) => {
            const color = CATEGORY_COLORS[a.category] || '#7f8c8d';
            const detailId = `detail-${item.generated}-${idx}`;
            return `
              <div style="border-bottom:1px solid #f0f0f0;">
                <div onclick="toggleDetail('${detailId}')" style="display:flex; align-items:center; gap:10px; padding:10px 20px; cursor:pointer; transition:background 0.15s;" onmouseover="this.style.background='#f8f9fa'" onmouseout="this.style.background=''">
                  <span style="flex-shrink:0; background:${color}; color:#fff; font-size:11px; padding:2px 8px; border-radius:10px; white-space:nowrap;">${a.category}</span>
                  <span style="flex:1; font-size:14px; color:#2c3e50; line-height:1.4;">${a.title}</span>
                  <span style="flex-shrink:0; font-size:12px; color:#b2bec3;">${a.journal_abbr || ''}</span>
                  <span style="flex-shrink:0; font-size:13px; color:#b2bec3;">›</span>
                </div>
                <div id="${detailId}" style="display:none; padding:16px 20px 20px; background:#fafafa; border-top:1px solid #f0f0f0;">
                  <p style="font-size:13px; color:#636e72; margin:0 0 12px;">${a.authors} · ${a.pubdate}</p>
                  <div style="display:grid; gap:10px; font-size:14px;">
                    <div><strong style="color:#2c3e50;">背景</strong><p style="margin:4px 0 0;">${a.background}</p></div>
                    <div><strong style="color:#2c3e50;">方法</strong><p style="margin:4px 0 0;">${a.methods}</p></div>
                    <div><strong style="color:#2c3e50;">結果</strong><p style="margin:4px 0 0;">${a.results}</p></div>
                    <div><strong style="color:#2c3e50;">結論</strong><p style="margin:4px 0 0;">${a.conclusion}</p></div>
                  </div>
                  ${a.pmid ? `<a href="https://pubmed.ncbi.nlm.nih.gov/${a.pmid}/" target="_blank" style="display:inline-block; margin-top:12px; font-size:12px; color:#2980b9;">PubMed →</a>` : ''}
                </div>
              </div>
            `;
          }).join('')}
        </div>
      </div>
    `).join('');
  } catch (e) {
    list.innerHTML = '<p style="color:#636e72;">載入失敗，請稍後再試</p>';
  }
}

function toggleDetail(id) {
  const el = document.getElementById(id);
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

loadArchive();
</script>
</body>
</html>
